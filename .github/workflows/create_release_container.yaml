name: Create Release Container

on:
  release:
    types:
      - published

jobs:
  docker-image:
    name: Create Release Container
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: gacts/github-slug@v1
        id: slug

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: >
          docker build
          --file ./filemgr/Dockerfile
          -t ferdn4ndo/userver-filemgr:latest
          --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          --build-arg BUILD_VERSION=${{ github.event.release.tag_name }}
          --build-arg VCS_REF=${GITHUB_SHA}
          ./filemgr

      - name: Tag the versioned Docker image
        run: docker tag ferdn4ndo/userver-filemgr:latest ferdn4ndo/userver-filemgr:${{ steps.slug.outputs.version }}

      - name: Push the versioned Docker image to the registry
        run: docker push ferdn4ndo/userver-filemgr:${{ steps.slug.outputs.version }}

      - name: Push the latest Docker image to the registry
        run: docker push ferdn4ndo/userver-filemgr:latest
