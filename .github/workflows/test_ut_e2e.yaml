name: Unit and integration tests

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
    tags-ignore:
      - '**'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  go-tests:
    name: Go tests (toolchain in container)
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-bookworm
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      GOTOOLCHAIN: local
      POSTGRES_TEST_URL: postgres://postgres:postgres@postgres:5432/userver_filemgr_it?sslmode=disable

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install client tools
        run: |
          apt-get update -qq
          apt-get install -y -qq postgresql-client

      - name: Create integration database
        run: |
          for i in $(seq 1 30); do
            PGPASSWORD=postgres psql -h postgres -U postgres -c 'SELECT 1' && break
            sleep 1
          done
          PGPASSWORD=postgres psql -h postgres -U postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE userver_filemgr_it;"

      - name: Run unit tests
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Run integration tests
        run: go test -tags=integration -v ./integration/... -count=1

      - name: Show coverage total
        run: go tool cover -func=coverage.out | tail -1

  docker-smoke:
    name: Docker image build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build release image
        run: >
          docker build
          --file ./Dockerfile
          --tag userver-filemgr:ci
          --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          --build-arg BUILD_VERSION=${{ github.sha }}
          --build-arg VCS_REF=${GITHUB_SHA}
          .
